<!DOCTYPE html>
<html>
<head>
    <title>Pipou ❤️</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #0a0a0a, #000);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* 🌌 étoiles */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            opacity: 0.7;
            animation: twinkle 3s infinite alternate;
        }

        @keyframes twinkle {
            from { opacity: 0.2; }
            to { opacity: 1; }
        }

        /* 🖱️ lumière souris */
        .light {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
            pointer-events: none;
            transform: translate(-50%, -50%);
        }

        .container {
            text-align: center;
            z-index: 2;
        }

        h1 {
            font-size: 42px;
            letter-spacing: 3px;
            margin-bottom: 50px;
            opacity: 0;
            animation: fadeIn 2s ease forwards;
            text-shadow: 0 0 25px rgba(255,255,255,0.2);
        }

        button {
            padding: 14px 28px;
            margin: 10px;
            font-size: 15px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: rgba(255,255,255,0.08);
            transform: scale(1.08);
            box-shadow: 0 0 25px rgba(255,255,255,0.25);
        }

        #message {
            margin-top: 40px;
            font-size: 22px;
            letter-spacing: 1px;
        }

        .typing {
            border-right: 2px solid white;
            white-space: nowrap;
            overflow: hidden;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        /* 🧸 OURS */
        #bear {
            position: absolute;
            bottom: 40px;
            width: 120px;
            opacity: 0;
            animation: breathe 3s infinite ease-in-out;
            transition: 0.8s;
        }

        #bear.show {
            opacity: 1;
        }

        @keyframes breathe {
            0%,100% { transform: scale(0.95); }
            50% { transform: scale(1.05); }
        }

        /* ❤️ coeurs */
        .heart {
            position: absolute;
            color: rgba(255, 0, 80, 0.7);
            font-size: 18px;
            animation: floatUp linear;
        }

        @keyframes floatUp {
            from { transform: translateY(100vh); opacity: 0; }
            20% { opacity: 1; }
            to { transform: translateY(-10vh); opacity: 0; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

    </style>
</head>

<body>

<!-- 🌌 étoiles -->
<script>
for(let i=0;i<80;i++){
    let star = document.createElement("div");
    star.className = "star";
    star.style.left = Math.random()*100 + "vw";
    star.style.top = Math.random()*100 + "vh";
    star.style.animationDuration = (2 + Math.random()*3) + "s";
    document.body.appendChild(star);
}
</script>

<!-- 🖱️ lumière -->
<div class="light" id="light"></div>

<div class="container">
    <h1>Do you miss Pipou ?</h1>

    <button onclick="answer1()">Yes</button>
    <button onclick="answer2()">× 14</button>

    <div id="message"></div>
</div>

<!-- 🧸 OURS -->
<img id="bear" src="https://i.imgur.com/6RLKQ6L.png">

<!-- 🎵 MUSIQUE -->
<audio autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3">
</audio>

<script>

/* 🖱️ lumière qui suit la souris */
document.addEventListener("mousemove", e => {
    let light = document.getElementById("light");
    light.style.left = e.clientX + "px";
    light.style.top = e.clientY + "px";
});

/* réponses */
function answer1(){
    typeText("Pipou misses you too ❤️");
    showBear();
    hearts();
}

function answer2(){
    typeText("Pipou miss you mooooore ❤️");
    showBear();
    hearts();
}

/* ✍️ écriture */
function typeText(text){
    let msg = document.getElementById("message");
    msg.innerHTML = "";
    msg.classList.add("typing");

    let i = 0;

    function write(){
        if(i < text.length){
            msg.innerHTML += text.charAt(i);
            i++;
            setTimeout(write, 40);
        } else {
            msg.classList.remove("typing");
        }
    }

    write();
}

/* 🧸 ours */
function showBear(){
    document.getElementById("bear").classList.add("show");
}

/* ❤️ coeurs */
function hearts(){
    for(let i=0;i<15;i++){
        let heart = document.createElement("div");
        heart.innerHTML = "❤️";
        heart.className = "heart";

        heart.style.left = Math.random()*window.innerWidth + "px";
        heart.style.animationDuration = (5 + Math.random()*3) + "s";

        document.body.appendChild(heart);

        setTimeout(()=>heart.remove(),8000);
    }
}

</script>

</body>
</html>
